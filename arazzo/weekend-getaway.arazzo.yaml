arazzo: "1.0.0"

info:
  title: Weekend Getaway Planner
  summary: Plan a spontaneous weekend getaway — check the weather, find a hotel, book it, and block your calendar.
  description: >
    Geocodes the destination city, checks the 5–7 day forecast, and confirms
    the weather is suitable. If so, searches hotel availability, prebooks and
    confirms the best rate, then creates a Google Calendar block for the trip.
  version: "2.0.0"

sourceDescriptions:
  - name: open-meteo-geocoding
    url: https://geocoding-api.open-meteo.com
    type: openapi
  - name: open-meteo
    url: https://raw.githubusercontent.com/jentic/jentic-public-apis/main/apis/openapi/open-meteo.com/main/1.0/openapi.json
    type: openapi
  - name: weatherapi
    url: https://raw.githubusercontent.com/jentic/jentic-public-apis/main/apis/openapi/weatherapi.com/main/1.0.0/openapi.json
    type: openapi
  - name: liteapi-hotel-data
    url: https://docs.liteapi.travel/openapi/api-hotel-data.json
    type: openapi
  - name: liteapi-search
    url: https://docs.liteapi.travel/openapi/api-search.json
    type: openapi
  - name: liteapi-booking
    url: https://docs.liteapi.travel/openapi/api-booking.json
    type: openapi
  - name: google-calendar
    url: https://raw.githubusercontent.com/jentic/jentic-public-apis/main/apis/openapi/googleapis.com/calendar/v3/openapi.json
    type: openapi

workflows:
  - workflowId: weekendGetawayPlanner
    summary: Plan a weekend getaway end-to-end
    description: >
      Orchestrates geocoding, weather checking, hotel search and booking, and
      calendar management for a spontaneous weekend trip.
    inputs:
      type: object
      required:
        - cityName
        - countryCode
        - checkinDate
        - checkoutDate
        - liteApiKey
        - weatherApiKey
        - googleCalendarToken
        - guestFirstName
        - guestLastName
        - guestEmail
      properties:
        cityName:
          type: string
          description: City name for geocoding and hotel search (e.g. "Galway")
        countryCode:
          type: string
          description: ISO 3166-1 alpha-2 country code (e.g. "IE")
        checkinDate:
          type: string
          description: Check-in date in YYYY-MM-DD format (next Friday)
        checkoutDate:
          type: string
          description: Check-out date in YYYY-MM-DD format (Saturday)
        guests:
          type: integer
          description: Number of adult guests
          default: 2
        currency:
          type: string
          description: Currency for hotel pricing
          default: EUR
        guestNationality:
          type: string
          description: Guest nationality as ISO country code
          default: IE
        calendarId:
          type: string
          description: Google Calendar ID to create the event on
          default: primary
        weatherApiKey:
          type: string
          description: WeatherAPI.com API key
        liteApiKey:
          type: string
          description: liteapi.travel API key
        googleCalendarToken:
          type: string
          description: Google OAuth2 Bearer token for Calendar API access
        guestFirstName:
          type: string
          description: Guest first name for booking
        guestLastName:
          type: string
          description: Guest last name for booking
        guestEmail:
          type: string
          description: Guest email address for booking confirmation
    outputs:
      latitude: $steps.geocode.outputs.latitude
      longitude: $steps.geocode.outputs.longitude
      forecastDates: $steps.getForecast.outputs.forecastDates
      prebookId: $steps.prebookRate.outputs.prebookId
      bookingId: $steps.confirmBooking.outputs.bookingId
      calendarEventId: $steps.createCalendarEvent.outputs.eventId
      calendarConflicts: $steps.listCalendarEvents.outputs.conflicts

    steps:
      - stepId: geocode
        description: Resolve city name to latitude and longitude using Open-Meteo Geocoding API
        operationPath: '{$sourceDescriptions.open-meteo-geocoding.url}#/paths/~1v1~1search/get'
        parameters:
          - name: name
            in: query
            value: $inputs.cityName
          - name: count
            in: query
            value: 1
          - name: language
            in: query
            value: "en"
          - name: format
            in: query
            value: "json"
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          latitude: $response.body#/results/0/latitude
          longitude: $response.body#/results/0/longitude
          timezone: $response.body#/results/0/timezone
          resolvedName: $response.body#/results/0/name

      - stepId: getForecast
        description: Retrieve the 7-day daily weather forecast for the destination
        operationPath: '{$sourceDescriptions.open-meteo.url}#/paths/~1v1~1forecast/get'
        parameters:
          - name: latitude
            in: query
            value: $steps.geocode.outputs.latitude
          - name: longitude
            in: query
            value: $steps.geocode.outputs.longitude
          - name: daily
            in: query
            value: "precipitation_sum,weathercode,wind_speed_10m_max"
          - name: timezone
            in: query
            value: $steps.geocode.outputs.timezone
          - name: forecast_days
            in: query
            value: 7
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          forecastDates: $response.body#/daily/time
          precipitation: $response.body#/daily/precipitation_sum
          weatherCodes: $response.body#/daily/weathercode

      - stepId: checkWeatherAlerts
        description: Check for active weather warnings at the destination
        operationId: getForecastWeather
        parameters:
          - name: key
            in: query
            value: $inputs.weatherApiKey
          - name: q
            in: query
            value: $inputs.cityName
          - name: days
            in: query
            value: 3
          - name: alerts
            in: query
            value: "yes"
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          alerts: $response.body#/alerts/alert

      - stepId: evaluateWeather
        description: >
          Re-fetch forecast for the exact Friday and enforce the getaway
          threshold: precipitation < 5mm and weathercode < 61 (no rain/storms).
          Step failure halts the workflow — destination conditions are unsuitable.
        operationPath: '{$sourceDescriptions.open-meteo.url}#/paths/~1v1~1forecast/get'
        parameters:
          - name: latitude
            in: query
            value: $steps.geocode.outputs.latitude
          - name: longitude
            in: query
            value: $steps.geocode.outputs.longitude
          - name: daily
            in: query
            value: "precipitation_sum,weathercode"
          - name: timezone
            in: query
            value: $steps.geocode.outputs.timezone
          - name: start_date
            in: query
            value: $inputs.checkinDate
          - name: end_date
            in: query
            value: $inputs.checkinDate
        successCriteria:
          - condition: $statusCode == 200
          - condition: $response.body#/daily/precipitation_sum/0 < 5
          - condition: $response.body#/daily/weathercode/0 < 61
        outputs:
          fridayPrecipitation: $response.body#/daily/precipitation_sum/0
          fridayWeatherCode: $response.body#/daily/weathercode/0

      - stepId: listHotels
        description: Retrieve hotels available in the destination city
        operationPath: '{$sourceDescriptions.liteapi-hotel-data.url}#/paths/~1data~1hotels/get'
        parameters:
          - name: X-API-Key
            in: header
            value: $inputs.liteApiKey
          - name: countryCode
            in: query
            value: $inputs.countryCode
          - name: cityName
            in: query
            value: $inputs.cityName
          - name: limit
            in: query
            value: 20
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          hotels: $response.body#/data
          hotelIds: $response.body#/data[*]/hotelId

      - stepId: searchHotelRates
        description: Search availability and pricing for hotels on the target dates
        operationPath: '{$sourceDescriptions.liteapi-search.url}#/paths/~1hotels~1rates/post'
        parameters:
          - name: X-API-Key
            in: header
            value: $inputs.liteApiKey
        requestBody:
          contentType: application/json
          payload:
            hotelIds: $steps.listHotels.outputs.hotelIds
            checkin: $inputs.checkinDate
            checkout: $inputs.checkoutDate
            currency: $inputs.currency
            guestNationality: $inputs.guestNationality
            occupancies:
              - adults: $inputs.guests
                children: []
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          rateResults: $response.body#/data
          bestOfferId: $response.body#/data/0/roomTypes/0/offerId
          bestOfferPrice: $response.body#/data/0/roomTypes/0/price/totalPrice
          bestOfferCurrency: $response.body#/data/0/roomTypes/0/price/currency

      - stepId: prebookRate
        description: Lock in the selected hotel rate to confirm availability and price
        operationPath: '{$sourceDescriptions.liteapi-booking.url}#/paths/~1rates~1prebook/post'
        parameters:
          - name: X-API-Key
            in: header
            value: $inputs.liteApiKey
        requestBody:
          contentType: application/json
          payload:
            offerId: $steps.searchHotelRates.outputs.bestOfferId
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          prebookId: $response.body#/data/prebookId
          confirmedPrice: $response.body#/data/price

      - stepId: confirmBooking
        description: Complete the hotel booking using the prebook ID
        operationPath: '{$sourceDescriptions.liteapi-booking.url}#/paths/~1rates~1book/post'
        parameters:
          - name: X-API-Key
            in: header
            value: $inputs.liteApiKey
        requestBody:
          contentType: application/json
          payload:
            prebookId: $steps.prebookRate.outputs.prebookId
            guestInfo:
              guestFirstName: $inputs.guestFirstName
              guestLastName: $inputs.guestLastName
              guestEmail: $inputs.guestEmail
            payment:
              paymentType: INVOICE
        successCriteria:
          - condition: $statusCode == 200
        onFailure:
          - name: sandboxPaymentFailure
            type: goto
            stepId: listCalendarEvents
            criteria:
              - condition: $statusCode == 400
        outputs:
          bookingId: $response.body#/data/bookingId
          bookingStatus: $response.body#/data/status

      - stepId: listCalendarEvents
        description: List existing calendar events on the getaway dates to surface conflicts
        operationId: calendar.events.list
        parameters:
          - name: calendarId
            in: path
            value: $inputs.calendarId
          - name: Authorization
            in: header
            value: $inputs.googleCalendarToken
          - name: timeMin
            in: query
            value: $inputs.checkinDate
          - name: timeMax
            in: query
            value: $inputs.checkoutDate
          - name: singleEvents
            in: query
            value: true
          - name: orderBy
            in: query
            value: startTime
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          conflicts: $response.body#/items

      - stepId: createCalendarEvent
        description: Create an all-day calendar block for the weekend getaway
        operationId: calendar.events.insert
        parameters:
          - name: calendarId
            in: path
            value: $inputs.calendarId
          - name: Authorization
            in: header
            value: $inputs.googleCalendarToken
        requestBody:
          contentType: application/json
          payload:
            summary: "Weekend Getaway — {cityName}"
            start:
              date: $inputs.checkinDate
            end:
              date: $inputs.checkoutDate
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          eventId: $response.body#/id
